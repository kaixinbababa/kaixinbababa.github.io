---
layout: default
title: College Diary
---

<h2 class="pb-2 border-bottom">College Diary</h2>
<div class="row g-4 py-3">
  {% for post in site.categories.college %}
  <div class="col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h5 class="card-title">
          <a href="{{ post.url }}" class="text-decoration-none stretched-link">{{ post.title }}</a>
        </h5>
        <p class="card-text text-muted small">{{ post.date | date: "%B %d, %Y" }}</p>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
