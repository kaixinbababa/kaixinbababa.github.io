---
layout: default
title: Tech Notes
---

<h2 class="pb-2 border-bottom">Tech Notes</h2>
<div class="row g-4 py-3">
  {% for post in site.categories.work %}
  <div class="col-md-6">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h5 class="card-title">
          <a href="{{ post.url }}" class="text-decoration-none stretched-link">{{ post.title }}</a>
        </h5>
        <p class="card-text text-muted small">{{ post.date | date: "%B %d, %Y" }}</p>
        {% if post.excerpt %}
        <p class="card-text">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
        {% endif %}
      </div>
    </div>
  </div>
  {% endfor %}
</div>
