---
layout: default
title: Author
---

<div class="row">
  <div class="col-lg-8 mx-auto">
    {% for author in site.authors %}
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h3 class="card-title">{{ author.name }}</h3>
        <p class="card-text text-muted">{{ author.position }}</p>
        <hr>
        <div class="card-text">
          {{ author.content | markdownify }}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
